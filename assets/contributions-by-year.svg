<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bar2022" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff79c6"/>
      <stop offset="100%" stop-color="#bd93f9"/>
    </linearGradient>
    <linearGradient id="bar2023" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#6272a4"/>
    </linearGradient>
    <linearGradient id="bar2024" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#50fa7b"/>
      <stop offset="100%" stop-color="#28a745"/>
    </linearGradient>
    <linearGradient id="bar2025" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb86c"/>
      <stop offset="100%" stop-color="#f1fa8c"/>
    </linearGradient>
    <linearGradient id="bar2026" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff5555"/>
      <stop offset="100%" stop-color="#ff79c6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="#282a36"/>
  <rect width="800" height="320" rx="16" fill="none" stroke="#44475a" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="18" font-weight="600">Contributions by Year</text>

  <!-- Axes -->
  <line x1="100" y1="70" x2="100" y2="250" stroke="#44475a" stroke-width="0.5"/>
  <line x1="100" y1="250" x2="720" y2="250" stroke="#44475a" stroke-width="1"/>
  <line x1="100" y1="205" x2="720" y2="205" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="160" x2="720" y2="160" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="115" x2="720" y2="115" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>
  <line x1="100" y1="70" x2="720" y2="70" stroke="#44475a" stroke-width="0.3" stroke-dasharray="4"/>

  <!-- Y-axis labels -->
  <text x="90" y="254" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">0</text>
  <text x="90" y="209" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">100</text>
  <text x="90" y="164" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">200</text>
  <text x="90" y="119" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">300</text>
  <text x="90" y="74" text-anchor="end" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">400</text>

  <!-- Bars -->
  <rect x="170" y="249.1" width="80" height="0.9" rx="4" fill="url(#bar2022)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="0.9" dur="0.6s" fill="freeze"/>
    <animate attributeName="y" from="250" to="249.1" dur="0.6s" fill="freeze"/>
  </rect>
  <text x="210" y="241" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">2</text>
  <text x="210" y="272" text-anchor="middle" fill="#bd93f9" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2022</text>
  <rect x="270" y="177.1" width="80" height="72.9" rx="4" fill="url(#bar2023)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="72.9" dur="0.7s" fill="freeze"/>
    <animate attributeName="y" from="250" to="177.1" dur="0.7s" fill="freeze"/>
  </rect>
  <text x="310" y="169" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">162</text>
  <text x="310" y="272" text-anchor="middle" fill="#8be9fd" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2023</text>
  <rect x="370" y="197.3" width="80" height="52.6" rx="4" fill="url(#bar2024)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="52.6" dur="0.8s" fill="freeze"/>
    <animate attributeName="y" from="250" to="197.3" dur="0.8s" fill="freeze"/>
  </rect>
  <text x="410" y="189" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">117</text>
  <text x="410" y="272" text-anchor="middle" fill="#50fa7b" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2024</text>
  <rect x="470" y="188.3" width="80" height="61.7" rx="4" fill="url(#bar2025)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="61.7" dur="0.9s" fill="freeze"/>
    <animate attributeName="y" from="250" to="188.3" dur="0.9s" fill="freeze"/>
  </rect>
  <text x="510" y="180" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">137</text>
  <text x="510" y="272" text-anchor="middle" fill="#ffb86c" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2025</text>
  <rect x="570" y="83.9" width="80" height="166.1" rx="4" fill="url(#bar2026)" filter="url(#glow)">
    <animate attributeName="height" from="0" to="166.1" dur="1.0s" fill="freeze"/>
    <animate attributeName="y" from="250" to="83.9" dur="1.0s" fill="freeze"/>
  </rect>
  <text x="610" y="76" text-anchor="middle" fill="#f8f8f2" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="14" font-weight="600">369</text>
  <text x="610" y="272" text-anchor="middle" fill="#ff5555" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="600">2026</text>

  <!-- Footer -->
  <text x="400" y="300" text-anchor="middle" fill="#6272a4" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11">Total: 787 contributions since Nov 2022</text>
</svg>
