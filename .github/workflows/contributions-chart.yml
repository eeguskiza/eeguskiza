name: Update Contributions Chart

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contributions chart
        run: python .github/scripts/update-contributions.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contributions-by-year.svg
          git diff --quiet HEAD || git commit -m "chore: update contributions-by-year chart"
          git push
